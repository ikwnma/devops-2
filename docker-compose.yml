services:
  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend-ventas:
    build: ./back-Ventas_SpringBoot/Springboot-API-REST
    image: ventas-backend:1.0
    ports:
      - "8080:8080"
    environment:
      DB_ENDPOINT: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME}
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD}
    networks:
      - app-network
    depends_on:
      mysql:
        condition: service_healthy

  backend-despachos:
    build: ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
    image: despachos-backend:1.0
    ports:
      - "8081:8081"
    environment:
      DB_ENDPOINT: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME}
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD}
    networks:
      - app-network
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build: ./front_despacho
    image: despacho-frontend:1.0
    ports:
      - "3000:8080"
    environment:
      BACKEND_HOST: backend-ventas
      BACKEND_HOST_DESPACHOS: backend-despachos
    networks:
      - app-network
    depends_on:
      - backend-ventas
      - backend-despachos

networks:
  app-network:
    driver: bridge

volumes:
  mysql_data:
