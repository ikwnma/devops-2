name: CI/CD Deploy a AWS (Arquitectura Bastion)

on:
  push:
    branches:
      - feature/prueba-deploy

jobs:
  build-and-deploy:
    runs-on: ubuntu-22.04

    steps:

      # ----------------------------------------------------------
      # 1. Obtener el código
      # ----------------------------------------------------------
      - name: Checkout del código
        uses: actions/checkout@v3

      # ----------------------------------------------------------
      # 2. Login en Docker Hub
      # ----------------------------------------------------------
      - name: Login en Docker Hub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login \
            -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # ----------------------------------------------------------
      # 3. Build y Push — Imágenes
      # ----------------------------------------------------------
      - name: Build y Push imagen Frontend
        run: |
          docker build --platform linux/amd64 -t ${{ secrets.DOCKER_USERNAME }}/spa-frontend:latest ./front_despacho
          docker push ${{ secrets.DOCKER_USERNAME }}/spa-frontend:latest

      - name: Build y Push imagen Backend Ventas
        run: |
          docker build --platform linux/amd64 -t ${{ secrets.DOCKER_USERNAME }}/spa-backend-ventas:latest ./back-Ventas_SpringBoot/Springboot-API-REST
          docker push ${{ secrets.DOCKER_USERNAME }}/spa-backend-ventas:latest

      - name: Build y Push imagen Backend Despachos
        run: |
          docker build --platform linux/amd64 -t ${{ secrets.DOCKER_USERNAME }}/spa-backend-despacho:latest ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
          docker push ${{ secrets.DOCKER_USERNAME }}/spa-backend-despacho:latest

      # ----------------------------------------------------------
      # 4. Desplegar Base de Datos (En instancia privada DATA)
      #    Usa el Frontend como Proxy (Bastion Host)
      # ----------------------------------------------------------
      - name: Desplegar MySQL en Servidor DATA (Privado)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:           ${{ secrets.EC2_DATA_IP }} # IP Privada
          username:       ec2-user
          key:            ${{ secrets.EC2_SSH_KEY }}
          proxy_host:     ${{ secrets.EC2_FRONT_IP }} # IP Pública
          proxy_username: ec2-user
          proxy_key:      ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker stop spa-mysql || true
            docker rm spa-mysql || true
            docker network create spa-net || true
            docker run -d \
              --name spa-mysql \
              --network spa-net \
              -p 3306:3306 \
              -e MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }} \
              -e MYSQL_DATABASE=${{ secrets.MYSQL_DATABASE }} \
              mysql:8

      # ----------------------------------------------------------
      # 5. Desplegar Backends (En instancia privada BACK)
      #    Usa el Frontend como Proxy (Bastion Host)
      # ----------------------------------------------------------
      - name: Desplegar Backends en Servidor BACK (Privado)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:           ${{ secrets.EC2_BACK_IP }} # IP Privada
          username:       ec2-user
          key:            ${{ secrets.EC2_SSH_KEY }}
          proxy_host:     ${{ secrets.EC2_FRONT_IP }} # IP Pública
          proxy_username: ec2-user
          proxy_key:      ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/spa-backend-ventas:latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/spa-backend-despacho:latest
            docker stop spa-backend-ventas spa-backend-despacho || true
            docker rm spa-backend-ventas spa-backend-despacho || true
            docker network create spa-net || true
            
            docker run -d \
              --name spa-backend-ventas \
              --network spa-net \
              -p 8080:8080 \
              -e DB_ENDPOINT=${{ secrets.EC2_DATA_IP }} \
              -e DB_PORT=3306 \
              -e DB_NAME=${{ secrets.MYSQL_DATABASE }} \
              -e DB_USERNAME=root \
              -e DB_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }} \
              ${{ secrets.DOCKER_USERNAME }}/spa-backend-ventas:latest

            docker run -d \
              --name spa-backend-despacho \
              --network spa-net \
              -p 8081:8081 \
              -e DB_ENDPOINT=${{ secrets.EC2_DATA_IP }} \
              -e DB_PORT=3306 \
              -e DB_NAME=${{ secrets.MYSQL_DATABASE }} \
              -e DB_USERNAME=root \
              -e DB_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }} \
              ${{ secrets.DOCKER_USERNAME }}/spa-backend-despacho:latest

      # ----------------------------------------------------------
      # 6. Desplegar Frontend (En instancia pública FRONT)
      # ----------------------------------------------------------
      - name: Desplegar Frontend en Servidor FRONT (Público)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.EC2_FRONT_IP }} # IP Pública
          username: ec2-user
          key:      ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/spa-frontend:latest
            docker stop spa-frontend || true
            docker rm spa-frontend || true
            docker network create spa-net || true
            docker run -d \
              --name spa-frontend \
              --network spa-net \
              -p 80:80 \
              ${{ secrets.DOCKER_USERNAME }}/spa-frontend:latest
