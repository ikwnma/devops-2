server {
    listen 80;
    server_name _;

    # Carpeta donde están los archivos estáticos del build de React
    root /usr/share/nginx/html;
    index index.html;

    # ----------------------------------------------------------------
    # SPA Fallback: cualquier ruta desconocida sirve index.html
    # Necesario para que React Router funcione correctamente
    # ----------------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ----------------------------------------------------------------
    # Reverse Proxy → Backend Ventas (puerto 8080)
    # El frontend llama a /api/ventas/* y Nginx lo redirige al backend
    # Esto elimina el problema de CORS y URLs hardcodeadas
    # ----------------------------------------------------------------
    location /api/ventas/ {
        proxy_pass         http://backend-ventas:8080/api/v1/ventas/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ----------------------------------------------------------------
    # Reverse Proxy → Backend Despachos (puerto 8081)
    # El frontend llama a /api/despachos/* y Nginx lo redirige al backend
    # ----------------------------------------------------------------
    location /api/despachos/ {
        proxy_pass         http://backend-despacho:8081/api/v1/despachos/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
